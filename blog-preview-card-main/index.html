<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <section class="section">
      <div class="card-container">
        <div class="image-container">
          <img
            class="main-image"
            src="./assets/images/illustration-article.svg"
            alt="illustration-article image"
          />
        </div>
        <div class="attribute-container">
          <span class="learning-attribute">Learning</span>
          <span class="date-attribute">Published 21 Dec 2023</span>
        </div>
        <div class="text-continer">
          <h1>HTML & CSS foundations</h1>
          <p>
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <div class="profile-container">
          <img
            class="profile-image"
            src="./assets/images/image-avatar.webp"
            alt="image avatar image"
          />
          <span>Michelle Appleton</span>
        </div>
      </div>
    </section>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">HAMZA IBBOU</a>.
    </footer>
  </body>
</html>
